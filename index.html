<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Exoplanet Detection | Learners' Space</title>
  <meta name="description" content="A page-wise interactive presentation website on exoplanet detection methods." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="spaceCanvas" aria-hidden="true"></canvas>
  <div class="aurora" aria-hidden="true"></div>
  <div class="grain" aria-hidden="true"></div>

  <header class="topbar">
    <button class="icon-button" id="menuBtn" aria-label="Open slide map">☰</button>
    <div class="brand">
      <span class="brand-mark">✦</span>
      <span>Exoplanet Detection</span>
    </div>
    <div class="progress-wrap" aria-label="Presentation progress">
      <div class="progress-line"><span id="progressLine"></span></div>
      <span id="counter">01 / 60</span>
    </div>
    <button class="icon-button" id="notesBtn" aria-label="Toggle speaker notes">Notes</button>
  </header>

  <aside class="chapter-rail" id="chapterRail" aria-label="Chapter navigation"></aside>

  <main id="deck" class="deck" aria-live="polite"></main>

  <section class="slide-map" id="slideMap" aria-hidden="true">
    <div class="map-panel">
      <div class="map-head">
        <div>
          <p class="eyebrow">Mission Map</p>
          <h2>Jump to any slide</h2>
        </div>
        <button class="icon-button" id="closeMap" aria-label="Close slide map">×</button>
      </div>
      <div class="map-grid" id="mapGrid"></div>
    </div>
  </section>

  <aside class="speaker-notes" id="speakerNotes" aria-hidden="true">
    <div class="notes-head">
      <span>Presenter Notes</span>
      <button class="icon-button" id="closeNotes">×</button>
    </div>
    <div id="notesContent"></div>
  </aside>

  <footer class="controls-hint">
    <span>↑ ↓ ← → / scroll</span>
    <span>O: overview</span>
    <span>N: notes</span>
    <span>F: fullscreen</span>
  </footer>

  <script src="script.js"></script>
</body>
</html>
